name: ai_travel_assistant
description: >
  Reusable AI Travel Assistant feature module for airline mobile apps.
  Provides a conversational (text + voice) interface for flight status,
  seat selection, baggage purchase, terminal/gate info, airport navigation,
  and human-agent escalation. Designed to be dropped into an existing
  Flutter app as a self-contained feature module.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3

  # JSON / immutable models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Voice
  speech_to_text: ^6.6.1
  flutter_tts: ^4.0.2

  # Chat UI / markdown rendering
  flutter_markdown: ^0.7.1

  # Utilities
  equatable: ^2.0.5
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.3.0

  # Dependency injection
  get_it: ^7.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  # Testing
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
