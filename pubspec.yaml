name: ai_travel_assistant
description: >
  Reusable AI Travel Assistant feature module for airline mobile apps.
  Provides a conversational (text + voice) interface for flight status,
  seat selection, baggage purchase, terminal/gate info, airport navigation,
  and human-agent escalation. Designed to be dropped into an existing
  Flutter app as a self-contained feature module.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3

  # Configuration — Gemini API key loaded from a local .env file
  flutter_dotenv: ^5.1.0

  # JSON / immutable models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Voice
  # 7.x drops the legacy v1 Android embedding (registrar.context/messenger),
  # which Flutter 3.29+ removed — 6.x fails to compile against current Flutter.
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  # Voice mode 2 (voice conversation): record the audio for a replayable
  # bubble, play it back with audioplayers.
  record: ^5.1.2
  audioplayers: ^6.1.0

  # Chat UI / markdown rendering
  flutter_markdown: ^0.7.1

  # Utilities
  equatable: ^2.0.5
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.3.0

  # Dependency injection
  get_it: ^7.7.0
  path_provider: ^2.1.6

# record 5.2.1 caps record_linux at <1.0.0 (0.7.2), but its record_android
# pulls record_platform_interface up to 1.6.0 — and 0.7.2 doesn't implement
# that interface (startStream/hasPermission), which breaks the Dart kernel
# compile even for Android builds. Force the interface-compatible Linux impl
# (the pairing record 6.2.1 uses). We never target Linux; this only needs to
# compile.
dependency_overrides:
  record_linux: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  # Testing
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    # Local, git-ignored env file holding GEMINI_API_KEY. Copy .env.example
    # to .env and add your key. Bundled as an asset so flutter_dotenv can read it.
    - .env
  # assets:
  #   - assets/images/
  #   - assets/lottie/
